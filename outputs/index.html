        for (let pullIndex = 0; pullIndex < pulls.length; pullIndex++) {
          const pull = pulls[pullIndex];
          const c = toScreen(transformPoint(pull, item));
          const r = Math.max(2, pull.r * state.scale);
          ctx.beginPath();
          ctx.arc(c.x, c.y, r, 0, Math.PI * 2);
          ctx.fillStyle = item.id === state.selectedId ? "rgba(21, 96, 189, 0.10)" : "rgba(200, 24, 24, 0.04)";
          ctx.strokeStyle = item.id === state.selectedId ? "#1560bd" : "#c81818";
          ctx.lineWidth = item.id === state.selectedId ? 2 : 1.2;
          ctx.fill();
          ctx.stroke();
          if (item.id === state.selectedId) {
            ctx.beginPath();
            ctx.arc(c.x, c.y, 5, 0, Math.PI * 2);
            ctx.fillStyle = "#1560bd";
            ctx.fill();
          }
        }
      }
    }

    function renderAll() {
      renderToolList();
      renderLayoutItems();
      drawLayout();
      const sel = getSelectedItem();
      el.rotInput.value = sel ? sel.rot.toFixed(0) : "0";
      scheduleAutosave();
    }

    function hitTest(world) {
      for (let i = state.items.length - 1; i >= 0; i--) {
        const item = state.items[i], tool = getTool(item.toolId);
        const pts = tool.points.map(p => transformPoint(p, item));
        if (pointInPolygon(world, pts)) return item;
      }
      return null;
    }

    function hitTestPull(world) {
      const item = getSelectedItem();
      if (!item) return null;
      const pulls = itemPulls(item);
      for (let i = pulls.length - 1; i >= 0; i--) {
        const c = transformPoint(pulls[i], item);
        if (dist(world, c) <= Math.max(8 / state.scale, pulls[i].r + 4)) {
          return { item, pullIndex: i };
        }
      }
      return null;
    }

    function pointInPolygon(p, pts) {
      let inside = false;
      for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
        const a = pts[i], b = pts[j];
        const intersect = ((a.y > p.y) !== (b.y > p.y)) && (p.x < (b.x - a.x) * (p.y - a.y) / (b.y - a.y + 1e-9) + a.x);
        if (intersect) inside = !inside;
      }
      return inside;
    }

    function escapeHtml(text) {
      return text.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[c]));
    }

    function download(name, text, type = "application/dxf") {
      const blob = new Blob([text], { type });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = name;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function dxfPolyline(points, layer) {
      const lines = ["0", "LWPOLYLINE", "8", layer, "90", String(points.length - 1), "70", "1"];
      for (const p of points.slice(0, -1)) {
        lines.push("10", p.x.toFixed(3), "20", p.y.toFixed(3));
      }
      return lines;
    }

    function makeDxf(entities, drawer = null) {
      const lines = ["0", "SECTION", "2", "ENTITIES"];
      if (drawer) {
        lines.push(...dxfPolyline([
          { x: 0, y: 0 }, { x: drawer.w, y: 0 }, { x: drawer.w, y: drawer.h },
          { x: 0, y: drawer.h }, { x: 0, y: 0 }
        ], "DRAWER"));
      }
      for (const ent of entities) {
        lines.push(...dxfPolyline(ent.points, ent.layer));
      }
      lines.push("0", "ENDSEC", "0", "EOF", "");
      return lines.join("\n");
    }

    function exportLayout() {
      if (!state.items.length) {
        showNotice("No layout items to export. Add at least one detected tool first.");
        return;
      }
      const ents = [];
      state.items.forEach((item, idx) => {
        const tool = getTool(item.toolId);
        const layer = ("CUT_" + (idx + 1) + "_" + tool.name).replace(/[^A-Za-z0-9_]/g, "_").slice(0, 40);
        ents.push({
          layer,
          points: combinedLocalPoints(item).map(p => transformPoint(p, item))
        });
      });
      const dxf = makeDxf(ents, { w: Number(el.drawerW.value), h: Number(el.drawerH.value) });
      download(`${safeFileBase(cleanProjectName())}_layout.dxf`, dxf);
      showNotice(`Success: exported drawer DXF with ${state.items.length} single-contour cutout(s).`);
    }

    function exportSelected() {
      const item = getSelectedItem();
      if (!item) {
        showNotice("Select a layout item before exporting one tool DXF.");
        return;
      }
      const tool = getTool(item.toolId);
      const ents = [{ layer: "CUT", points: combinedLocalPoints(item) }];
      const dxf = makeDxf(ents);
      download(tool.name.replace(/[^A-Za-z0-9_-]/g, "_") + ".dxf", dxf);
      showNotice(`Success: exported ${tool.name} as one contour DXF.`);
    }

    el.fileInput.addEventListener("change", () => {
      state.files = Array.from(el.fileInput.files || []);
      setStatus(`${state.files.length} image(s) ready.`);
    });

    el.saveProject.addEventListener("click", () => saveProject(false));
    el.loadProject.addEventListener("click", loadSavedProject);
    el.newProject.addEventListener("click", newProject);
    el.exportProject.addEventListener("click", exportProjectFile);
    el.projectName.addEventListener("input", scheduleAutosave);
    el.importProject.addEventListener("click", () => el.importProjectInput.click());
    el.importProjectInput.addEventListener("change", () => {
      const file = el.importProjectInput.files && el.importProjectInput.files[0];
      if (file) importProjectFile(file);
      el.importProjectInput.value = "";
    });

    el.processBtn.addEventListener("click", async () => {
      if (!state.files.length) {
        setStatus("Choose one or more images first.");
        return;
      }
      el.processBtn.disabled = true;
      try {
        for (let i = 0; i < state.files.length; i++) {
          setStatus(`Processing ${i + 1} of ${state.files.length}: ${state.files[i].name}`);
          const tool = await processFile(state.files[i], i);
          state.tools.push(tool);
          addToolToLayout(tool);
        }
        await autoArrangeAll();
        setStatus("Done. Drag tools in the drawer and export DXF.");
      } catch (err) {
        console.error(err);
        setStatus("Could not process image: " + err.message);
      } finally {
        el.processBtn.disabled = false;
        renderAll();
      }
    });

    el.canvas.addEventListener("pointerdown", ev => {
      const rect = el.canvas.getBoundingClientRect();
      const world = toWorld(ev.clientX - rect.left, ev.clientY - rect.top);
      const pullHit = hitTestPull(world);
      if (pullHit) {
        state.selectedId = pullHit.item.id;
        state.drag = { mode: "pull", id: pullHit.item.id, pullIndex: pullHit.pullIndex };
        renderAll();
        return;
      }
      const hit = hitTest(world);
      if (hit) {
        state.selectedId = hit.id;
        state.drag = { mode: "item", id: hit.id, dx: world.x - hit.x, dy: world.y - hit.y };
      } else {
        state.selectedId = null;
        state.drag = null;
      }
      renderAll();
    });

    window.addEventListener("pointermove", ev => {
      if (!state.drag) return;
      const rect = el.canvas.getBoundingClientRect();
      const world = toWorld(ev.clientX - rect.left, ev.clientY - rect.top);
      const item = state.items.find(i => i.id === state.drag.id);
      if (item) {
        if (state.drag.mode === "pull") {
          const local = localPointFromWorld(world, item);
          const pulls = itemPulls(item);
          snapPullToContour(pulls[state.drag.pullIndex], item, local);
          invalidateContourCache(item);
          clampItemToDrawer(item);
        } else {
          item.x = world.x - state.drag.dx;
          item.y = world.y - state.drag.dy;
          clampItemToDrawer(item);
        }
        drawLayout();
      }
    });

    window.addEventListener("pointerup", () => {
      if (!state.drag) return;
      state.drag = null;
      renderAll();
    });
    window.addEventListener("resize", drawLayout);
    el.drawerW.addEventListener("input", fitView);
    el.drawerH.addEventListener("input", fitView);
    el.fitView.addEventListener("click", fitView);
    el.zoomOut.addEventListener("click", () => zoomView(0.82));
    el.zoomIn.addEventListener("click", () => zoomView(1.22));
    el.downloadLayout.addEventListener("click", exportLayout);
    el.downloadSelected.addEventListener("click", exportSelected);
    el.autoArrange.addEventListener("click", () => autoArrangeAll());
    el.duplicateSelected.addEventListener("click", () => {
      const item = getSelectedItem();
      if (!item) {
        showNotice("Select a layout item before duplicating.");
        return;
      }
      const copy = { ...item, id: "item-" + Date.now(), x: item.x + 15, y: item.y + 15, pulls: clonePulls(itemPulls(item)) };
      clampItemToDrawer(copy);
      state.items.push(copy);
      state.selectedId = copy.id;
      renderAll();
      showNotice("Selected item duplicated.");
    });
    el.rotateLeft.addEventListener("click", () => rotateSelected(-15));
    el.rotateRight.addEventListener("click", () => rotateSelected(15));
    el.rotInput.addEventListener("input", () => {
      const item = getSelectedItem();
      if (!item) return;
      item.rot = Number(el.rotInput.value) || 0;
      clampItemToDrawer(item);
      drawLayout();
    });

    [el.offsetInput, el.spacingInput, el.smoothInput, el.arrangeSpacingInput, el.arrangeTimeInput].forEach(input => {
      input.addEventListener("input", () => {
        invalidateContourCache();
        scheduleAutosave();
      });
    });

    function rotateSelected(delta) {
      const item = getSelectedItem();
      if (!item) {
        showNotice("Select a layout item before rotating.");
        return;
      }
      item.rot = (item.rot + delta) % 360;
      clampItemToDrawer(item);
      renderAll();
    }

    el.closePreview.addEventListener("click", hidePreview);
    el.previewModal.addEventListener("click", ev => {
      if (ev.target === el.previewModal) hidePreview();
    });
    window.addEventListener("keydown", ev => {
      if (ev.key === "Escape" && !el.previewModal.classList.contains("hidden")) hidePreview();
    });

    try {
      const rawProject = localStorage.getItem(PROJECT_STORAGE_KEY);
      if (rawProject) {
        applyProject(JSON.parse(rawProject));
        setStatus("Restored saved project from this browser.");
      } else {
        fitView();
      }
    } catch (err) {
      console.error(err);
      fitView();
      setStatus("Could not restore saved project. Start a new project or import a project JSON.");
    }
  </script>
</body>
</html>
